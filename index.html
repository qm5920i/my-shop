<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品展示</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background-color: #fff0f5;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    .product-title {
      font-size: 24px;
      color: #e91e63;
      margin: 10px 0;
      text-align: center;
    }
    .price {
      font-size: 20px;
      font-weight: bold;
      color: #444;
      text-align: center;
    }
    .description {
      font-size: 16px;
      margin: 10px 0;
      text-align: center;
    }
    .images {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .images img {
      width: 100%;
      border-radius: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background-color: #e91e63;
      color: white;
      padding: 14px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn:hover {
      background-color: #d81b60;
    }
    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .contact-form button {
      margin-top: 14px;
      background-color: #e91e63;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>

  <!-- ✅ Google Analytics 追踪代码 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>

<body>
  <div class="container">
    <div class="images">
      <img src="https://i.ibb.co/bMYL8B2X/d1660186547154631770.jpg" alt="产品图1" />
      <img src="https://i.ibb.co/m5Ptm4x3/d1660186547258561053.jpg" alt="产品图2" />
      <img src="https://i.ibb.co/zV2h9SFH/d1660186547276243500.jpg" alt="产品图3" />
    </div>

    <div class="product-title">自慰棒</div>
    <div class="price">¥199</div>
    <div class="description">和真的没什么区别，静音设计，柔软触感，适合新手使用。</div>

    <a href="mailto:yt748c@gmail.com?subject=我要下单&body=您好，我想购买您的产品，请联系我。" class="btn">立即下单</a>
    <a href="https://weixin.qq.com/r/你的微信链接" class="btn" target="_blank">微信客服</a>

    <!-- ✅ 表单：手机号 / 微信 / 留言 -->
    <form action="https://formspree.io/f/请替换成你的ID" method="POST" class="contact-form">
      <input type="text" name="phone" placeholder="手机号" required>
      <input type="text" name="wechat" placeholder="微信号" required>
      <textarea name="message" rows="4" placeholder="留言内容" required></textarea>
      <button type="submit">提交信息</button>
    </form>
  </div>
</body>
</html>
