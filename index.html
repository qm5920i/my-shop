<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D旋转照片墙</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        .box {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: animate 20s linear infinite;
        }
        @keyframes animate {
            0% {
                transform: perspective(1000px) rotateY(0deg);
            }
            100% {
                transform: perspective(1000px) rotateY(360deg);
            }
        }
        .box span {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: center;
            transform-style: preserve-3d;
        }
        .box span img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .box span:nth-child(1) {
            transform: rotateY(0deg) translateZ(400px);
        }
        .box span:nth-child(2) {
            transform: rotateY(30deg) translateZ(400px);
        }
        .box span:nth-child(3) {
            transform: rotateY(60deg) translateZ(400px);
        }
        .box span:nth-child(4) {
            transform: rotateY(90deg) translateZ(400px);
        }
        .box span:nth-child(5) {
            transform: rotateY(120deg) translateZ(400px);
        }
        .box span:nth-child(6) {
            transform: rotateY(150deg) translateZ(400px);
        }
        .box span:nth-child(7) {
            transform: rotateY(180deg) translateZ(400px);
        }
        .box span:nth-child(8) {
            transform: rotateY(210deg) translateZ(400px);
        }
        .box span:nth-child(9) {
            transform: rotateY(240deg) translateZ(400px);
        }
        .box span:nth-child(10) {
            transform: rotateY(270deg) translateZ(400px);
        }
        .box span:nth-child(11) {
            transform: rotateY(300deg) translateZ(400px);
        }
        .box span:nth-child(12) {
            transform: rotateY(330deg) translateZ(400px);
        }
    </style>
</head>
<body>
    <div class="box">
        <span><img src="https://i.ibb.co/fVYBP6sQ/1-jpg.jpg" alt="照片1"></span>
        <span><img src="https://i.ibb.co/cc00g2MD/2-jpg.jpg" alt="照片2"></span>
        <span><img src="https://i.ibb.co/TqM1C0QL/3-jpg.jpg" alt="照片3"></span>
        <span><img src="https://i.ibb.co/WvM6pkCg/4-jpg.jpg" alt="照片4"></span>
        <span><img src="https://i.ibb.co/ZRTdrHb7/5-jpg.jpg" alt="照片5"></span>
        <span><img src="https://i.ibb.co/XRxDs9v/6-jpg.jpg" alt="照片6"></span>
        <span><img src="https://i.ibb.co/XxLM88M4/7-jpg.png" alt="照片7"></span>
        <span><img src="https://i.ibb.co/1f6kD0wG/8-jpg.jpg" alt="照片8"></span>
        <span><img src="https://i.ibb.co/5W6pcHxr/9-jpg.jpg" alt="照片9"></span>
        <span><img src="https://i.ibb.co/prQXmmD4/10-jpg.jpg" alt="照片10"></span>
        <span><img src="https://i.ibb.co/s96vMyg6/11-jpg.jpg" alt="照片11"></span>
        <span><img src="https://i.ibb.co/dwJZfxxQ/12-jpg.jpg" alt="照片12"></span>
    </div>
</body>
</html>
