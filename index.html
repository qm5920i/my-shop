<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产品展示</title>
  <!-- Google Analytics 跟踪代码 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-X9YS76TJRJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-X9YS76TJRJ');
  </script>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background-color: #fff0f5;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    .product-title {
      font-size: 24px;
      color: #e91e63;
      margin: 10px 0;
      text-align: center;
    }
    .price {
      font-size: 20px;
      font-weight: bold;
      color: #444;
      text-align: center;
    }
    .description {
      font-size: 16px;
      margin: 10px 0;
      text-align: center;
    }
    .images {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .images img {
      width: 100%;
      border-radius: 12px;
    }
    .contact {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background-color: #e91e63;
      color: white;
      padding: 14px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      text-decoration: none;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #d81b60;
    }
    form {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #success-message {
      display: none;
      color: green;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="images">
      <img src="https://i.ibb.co/bMYL8B2X/d1660186547154631770.jpg" alt="产品图1" />
      <img src="https://i.ibb.co/m5Ptm4x3/d1660186547258561053.jpg" alt="产品图2" />
      <img src="https://i.ibb.co/zV2h9SFH/d1660186547276243500.jpg" alt="产品图3" />
    </div>
    <div class="product-title">自慰棒</div>
    <div class="price">¥199</div>
    <div class="description">和真的没什么区别，静音设计，柔软触感，适合新手使用。</div>

    <!-- 客服按钮 -->
    <a href="weixin://dl/officialaccounts" class="btn">微信客服</a>

    <!-- 表单 -->
    <form action="https://formspree.io/f/manjqyeo" method="POST" onsubmit="handleSubmit(event)">
      <input type="text" name="phone" placeholder="请输入手机号" required />
      <input type="text" name="wechat" placeholder="请输入微信号" required />
      <textarea name="message" placeholder="留言内容" required></textarea>
      <button type="submit" class="btn">提交信息</button>
    </form>

    <div id="success-message">✅ 提交成功！我们会尽快联系您。</div>

    <div class="contact">联系方式：yt748c@gmail.com</div>
    <a href="mailto:yt748c@gmail.com?subject=我要下单&body=您好，我想购买您的产品，请联系我。" class="btn">立即下单</a>
  </div>

  <!-- 表单 JS -->
  <script>
    function handleSubmit(event) {
      event.preventDefault();
      const form = event.target;

      fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          document.getElementById("success-message").style.display = "block";
          form.reset();
        } else {
          alert("提交失败，请稍后再试。");
        }
      }).catch(error => {
        alert("提交过程中出错，请检查网络。");
      });
    }
  </script>
</body>
</html>
